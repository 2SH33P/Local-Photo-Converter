<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地图片转 WebP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">纯前端静态版 / 浏览器端转换</p>
        <h1>任何常见图片格式转 WebP</h1>
        <p class="lead">
          文件只在你的浏览器本地处理，不会上传到服务端。可调压缩质量，实时下载转换结果。
        </p>
      </section>

      <section class="workspace-card">
        <div
          class="dropzone"
          id="dropzone"
          role="button"
          tabindex="0"
          aria-label="选择图片文件"
        >
          <input id="fileInput" type="file" accept="image/*" hidden />
          <div class="dropzone-copy">
            <strong>拖拽图片到这里</strong>
            <span>或点击选择文件</span>
          </div>
        </div>

        <div class="control-row">
          <label class="quality-card" for="qualityRange">
            <span>压缩质量</span>
            <strong id="qualityValue">80%</strong>
          </label>
          <input
            id="qualityRange"
            type="range"
            min="10"
            max="100"
            value="80"
            step="1"
          />
          <button id="convertBtn" class="primary-btn" type="button" disabled>
            转换为 WebP
          </button>
          <a id="downloadBtn" class="secondary-btn disabled" download>
            下载 WebP
          </a>
        </div>

        <p class="status-text" id="statusText">
          选择一张图片后开始转换。
        </p>

        <div class="result-grid">
          <article class="panel">
            <div class="panel-head">
              <h2>原图</h2>
              <span id="sourceMeta">未选择文件</span>
            </div>
            <div class="preview-wrap">
              <img id="sourcePreview" alt="原图预览" hidden />
              <p id="sourcePlaceholder" class="placeholder">
                暂无预览
              </p>
            </div>
          </article>

          <article class="panel">
            <div class="panel-head">
              <h2>WebP 结果</h2>
              <span id="resultMeta">尚未生成</span>
            </div>
            <div class="preview-wrap">
              <img id="resultPreview" alt="WebP 预览" hidden />
              <p id="resultPlaceholder" class="placeholder">
                转换完成后显示
              </p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
